<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程笔记助手</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>课程笔记助手</h1>
      <div class="page-info">
        <span id="current-page-title">加载中...</span>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="notes">笔记</button>
      <button class="tab-btn" data-tab="review">待复习</button>
      <button class="tab-btn" data-tab="courses">目录</button>
      <button class="tab-btn" data-tab="export">导出</button>
    </nav>

    <main class="content">
      <section class="tab-content active" id="tab-notes">
        <div class="notes-header">
          <input type="text" id="note-search" placeholder="搜索笔记...">
          <button class="btn-primary" id="btn-add-note">+ 新建笔记</button>
        </div>
        <div class="notes-list" id="notes-list">
          <div class="empty-state">
            <p>暂无笔记</p>
            <p class="hint">选中页面文字后点击"添加笔记"开始记录</p>
          </div>
        </div>
      </section>

      <section class="tab-content" id="tab-review">
        <div class="review-filters">
          <select id="filter-course">
            <option value="">全部课程</option>
          </select>
          <select id="filter-tag">
            <option value="">全部标签</option>
          </select>
          <select id="filter-status">
            <option value="">全部状态</option>
            <option value="unmastered">未掌握</option>
            <option value="mastered">已掌握</option>
            <option value="wrong">错题本</option>
          </select>
          <select id="filter-sort">
            <option value="createdAt-desc">最新创建</option>
            <option value="createdAt-asc">最早创建</option>
          </select>
        </div>
        <div class="review-list" id="review-list">
          <div class="empty-state">
            <p>暂无待复习内容</p>
          </div>
        </div>
      </section>

      <section class="tab-content" id="tab-courses">
        <div class="courses-header">
          <h2>课程目录</h2>
        </div>
        <div class="courses-list" id="courses-list">
          <div class="empty-state">
            <p>暂无课程</p>
            <p class="hint">添加笔记后会自动创建课程</p>
          </div>
        </div>
      </section>

      <section class="tab-content" id="tab-export">
        <div class="export-section">
          <h2>导出设置</h2>
          
          <div class="export-options">
            <div class="option-group">
              <label>导出格式</label>
              <div class="format-options">
                <label class="format-option">
                  <input type="radio" name="export-format" value="markdown" checked>
                  <span>Markdown</span>
                </label>
                <label class="format-option">
                  <input type="radio" name="export-format" value="text">
                  <span>纯文本</span>
                </label>
                <label class="format-option">
                  <input type="radio" name="export-format" value="print">
                  <span>打印版</span>
                </label>
              </div>
            </div>

            <div class="option-group">
              <label>导出范围</label>
              <select id="export-scope">
                <option value="all">全部笔记</option>
                <option value="current-course">当前课程</option>
                <option value="current-page">当前页面</option>
              </select>
            </div>

            <div class="option-group">
              <label>
                <input type="checkbox" id="export-include-source" checked>
                包含来源链接
              </label>
            </div>

            <div class="option-group">
              <label>
                <input type="checkbox" id="export-include-tags" checked>
                包含标签
              </label>
            </div>

            <div class="option-group">
              <label>
                <input type="checkbox" id="export-include-difficulty">
                包含难度
              </label>
            </div>
          </div>

          <button class="btn-primary btn-export" id="btn-export">导出笔记</button>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="note-modal-overlay">
    <div class="modal" id="note-modal">
      <div class="modal-header">
        <h3 id="modal-title">新建笔记</h3>
        <button class="btn-close" id="btn-modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>选中内容</label>
          <div class="note-text-preview" id="modal-text-preview">从页面选中文字</div>
        </div>
        <div class="form-group">
          <label>备注</label>
          <textarea id="modal-comment" placeholder="添加你的笔记备注..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>标签</label>
            <input type="text" id="modal-tags" placeholder="用逗号分隔">
          </div>
          <div class="form-group">
            <label>难度</label>
            <select id="modal-difficulty">
              <option value="easy">简单</option>
              <option value="medium" selected>中等</option>
              <option value="hard">困难</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>高亮颜色</label>
          <div class="color-options">
            <label class="color-option">
              <input type="radio" name="modal-color" value="yellow" checked>
              <span class="color-dot yellow"></span>
            </label>
            <label class="color-option">
              <input type="radio" name="modal-color" value="green">
              <span class="color-dot green"></span>
            </label>
            <label class="color-option">
              <input type="radio" name="modal-color" value="blue">
              <span class="color-dot blue"></span>
            </label>
            <label class="color-option">
              <input type="radio" name="modal-color" value="pink">
              <span class="color-dot pink"></span>
            </label>
            <label class="color-option">
              <input type="radio" name="modal-color" value="purple">
              <span class="color-dot purple"></span>
            </label>
          </div>
        </div>
        <div class="form-group">
          <label>复习提醒</label>
          <div class="reminder-options">
            <label class="reminder-option">
              <input type="radio" name="modal-reminder" value="" checked>
              <span>不提醒</span>
            </label>
            <label class="reminder-option">
              <input type="radio" name="modal-reminder" value="1h">
              <span>1小时后</span>
            </label>
            <label class="reminder-option">
              <input type="radio" name="modal-reminder" value="1d">
              <span>明天</span>
            </label>
            <label class="reminder-option">
              <input type="radio" name="modal-reminder" value="3d">
              <span>3天后</span>
            </label>
            <label class="reminder-option">
              <input type="radio" name="modal-reminder" value="7d">
              <span>1周后</span>
            </label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-modal-cancel">取消</button>
        <button class="btn-primary" id="btn-modal-save">保存</button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
